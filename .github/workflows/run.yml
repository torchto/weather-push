name: 天气推送

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: pip install requests

      - name: 运行天气推送
        run: python main.py
        env:
          WEATHER_KEY: ${{ secrets.WEATHER_KEY }}
          CITY: ${{ secrets.CITY }}
          CITY_NAME: ${{ secrets.CITY_NAME }}
          APPID: ${{ secrets.APPID }}
          APPSECRET: ${{ secrets.APPSECRET }}
          TEMPLATE_ID: ${{ secrets.TEMPLATE_ID }}
          OPENID: ${{ secrets.OPENID }}
