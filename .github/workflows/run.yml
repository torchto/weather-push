name: 天气推送

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: 安装 Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 运行天气推送
        run: python main.py
        env:
          APPID: ${{ secrets.APPID }}
          APPSECRET: ${{ secrets.APPSECRET }}
          OPENID: ${{ secrets.OPENID }}
          TEMPLATE_ID: ${{ secrets.TEMPLATE_ID }}
          CITY_NAME: ${{ secrets.CITY_NAME }}
          CITY: ${{ secrets.CITY }}
          WEATHER_KEY: ${{ secrets.WEATHER_KEY }}
